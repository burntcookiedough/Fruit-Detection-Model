# Fruit Detection Dataset Configuration
# Used by YOLOv8 for training, validation, and testing

path: ./dataset

train: train/images
val: valid/images
test: test/images

# Number of classes
nc: 8

# Class names (order matters — index 0 = apple, index 1 = banana, etc.)
names:
  0: apple
  1: banana
  2: orange
  3: mango
  4: pineapple
  5: watermelon
  6: grapes
  7: pomegranate
